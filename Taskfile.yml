# Taskfile.yml for rtsp-recorder
# Install task: https://taskfile.dev/installation/
# Or use: go install github.com/go-task/task/v3/cmd/task@latest

version: '3'

vars:
  BINARY_NAME: rtsp-recorder
  BUILD_DIR: .
  MAIN_PKG: .

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  build:
    desc: Build the rtsp-recorder binary
    cmds:
      - go build -o {{.BINARY_NAME}} {{.MAIN_PKG}}
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.BINARY_NAME}}"

  run:
    desc: Build and run the CLI (pass args with --)
    cmds:
      - task: build
      - ./{{.BINARY_NAME}} {{.CLI_ARGS}}

  test:
    desc: Run all tests
    cmds:
      - go test -v ./...

  test:utils:
    desc: Run file utility tests only
    cmds:
      - go test -v ./internal/utils/...

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f {{.BINARY_NAME}}

  install:
    desc: Install binary to $GOPATH/bin
    cmds:
      - go install {{.MAIN_PKG}}

  deps:
    desc: Download and tidy dependencies
    cmds:
      - go mod download
      - go mod tidy

  validate:
    desc: Run validate command (requires ffmpeg)
    cmds:
      - task: build
      - ./{{.BINARY_NAME}} validate

  record:*:
    desc: Record from RTSP stream (requires URL)
    vars:
      URL: '{{index .MATCH 0}}'
    cmds:
      - task: build
      - ./{{.BINARY_NAME}} record {{.URL}}

  fmt:
    desc: Format Go code
    cmds:
      - go fmt ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  lint:
    desc: Run linter (requires golangci-lint)
    cmds:
      - golangci-lint run

  check:
    desc: Run all checks (fmt, vet, test)
    cmds:
      - task: fmt
      - task: vet
      - task: test

  build:all:
    desc: Build for all supported architectures (cross-compilation)
    cmds:
      - mkdir -p dist
      - |
        echo "Building for all architectures..."
        # macOS
        GOOS=darwin GOARCH=amd64 go build -o dist/{{.BINARY_NAME}}-darwin-amd64 {{.MAIN_PKG}}
        GOOS=darwin GOARCH=arm64 go build -o dist/{{.BINARY_NAME}}-darwin-arm64 {{.MAIN_PKG}}
        # Linux
        GOOS=linux GOARCH=amd64 go build -o dist/{{.BINARY_NAME}}-linux-amd64 {{.MAIN_PKG}}
        GOOS=linux GOARCH=arm64 go build -o dist/{{.BINARY_NAME}}-linux-arm64 {{.MAIN_PKG}}
        GOOS=linux GOARCH=arm go build -o dist/{{.BINARY_NAME}}-linux-arm {{.MAIN_PKG}}
        # Windows
        GOOS=windows GOARCH=amd64 go build -o dist/{{.BINARY_NAME}}-windows-amd64.exe {{.MAIN_PKG}}
        GOOS=windows GOARCH=arm64 go build -o dist/{{.BINARY_NAME}}-windows-arm64.exe {{.MAIN_PKG}}
      - |
        echo "✅ All builds complete!"
        ls -lh dist/
    generates:
      - "dist/*"

  build:release:
    desc: Build release binaries with version info
    deps:
      - clean:dist
    vars:
      VERSION:
        sh: git describe --tags --abbrev=0 2>/dev/null || echo "dev"
      DATE:
        sh: date -u '+%Y-%m-%d_%H:%M:%S'
    cmds:
      - mkdir -p dist
      - |
        echo "Building release version {{.VERSION}}..."
        # macOS
        GOOS=darwin GOARCH=amd64 go build -ldflags "-s -w -X main.Version={{.VERSION}} -X main.BuildDate={{.DATE}}" -o dist/{{.BINARY_NAME}}-{{.VERSION}}-darwin-amd64 {{.MAIN_PKG}}
        GOOS=darwin GOARCH=arm64 go build -ldflags "-s -w -X main.Version={{.VERSION}} -X main.BuildDate={{.DATE}}" -o dist/{{.BINARY_NAME}}-{{.VERSION}}-darwin-arm64 {{.MAIN_PKG}}
        # Linux
        GOOS=linux GOARCH=amd64 go build -ldflags "-s -w -X main.Version={{.VERSION}} -X main.BuildDate={{.DATE}}" -o dist/{{.BINARY_NAME}}-{{.VERSION}}-linux-amd64 {{.MAIN_PKG}}
        GOOS=linux GOARCH=arm64 go build -ldflags "-s -w -X main.Version={{.VERSION}} -X main.BuildDate={{.DATE}}" -o dist/{{.BINARY_NAME}}-{{.VERSION}}-linux-arm64 {{.MAIN_PKG}}
        # Windows
        GOOS=windows GOARCH=amd64 go build -ldflags "-s -w -X main.Version={{.VERSION}} -X main.BuildDate={{.DATE}}" -o dist/{{.BINARY_NAME}}-{{.VERSION}}-windows-amd64.exe {{.MAIN_PKG}}
      - |
        echo "✅ Release builds complete!"
        ls -lh dist/

  clean:dist:
    desc: Remove distribution build artifacts
    cmds:
      - rm -rf dist/

  release:
    desc: Create GitHub release with binaries (requires gh CLI)
    vars:
      VERSION:
        sh: git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0"
    cmds:
      - |
        echo "Creating GitHub release {{.VERSION}}..."
        gh release create {{.VERSION}} \
          --title "Release {{.VERSION}}" \
          --generate-notes \
          dist/*
      - |
        echo "✅ Release {{.VERSION}} published!"
        echo "View at: https://github.com/fieu/rtsp-recorder/releases/tag/{{.VERSION}}"

  release:draft:
    desc: Create draft GitHub release with binaries
    vars:
      VERSION:
        sh: git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0"
    cmds:
      - |
        echo "Creating draft release {{.VERSION}}..."
        gh release create {{.VERSION}} \
          --draft \
          --title "Release {{.VERSION}}" \
          --notes-file CHANGELOG.md \
          dist/*
      - echo "✅ Draft release created. Publish when ready!"

  dev:
    desc: Watch and rebuild on changes (requires watchexec or similar)
    cmds:
      - |
        echo "Install watchexec: brew install watchexec"
        echo "Then run: watchexec -e go task build"
